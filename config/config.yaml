# NBA Game Outcome Prediction - Configuration

data:
  season: 2024
  date_from: 2023-10-01
  date_to: 2024-04-30
  rolling_window: 10  # games for rolling averages
  min_games_for_stats: 5  # minimum games to compute stats

models:
  logistic_regression:
    C: 1.0
    max_iter: 1000
    penalty: "l2"

  random_forest:
    n_estimators: 100
    max_depth: 15
    min_samples_split: 10
    min_samples_leaf: 4

  xgboost:
    n_estimators: 45
    learning_rate: 0.05
    max_depth: 6
    min_child_weight: 5
    subsample: 0.8
    colsample_bytree: 0.8

backtest:
  threshold: 0.05  # Divergence threshold to trigger trade
  bankroll: 10000  # Initial capital in dollars
  bet_sizing: "fixed"  # "fixed" or "kelly"
  fixed_bet_amount: 100  # Bet size if using fixed sizing

api:
  kalshi_base_url: "https://api.kalshi.com/v1"
  polymarket_base_url: "https://api.polymarket.com"
  # API keys loaded from .env file

evaluation:
  test_size: 0.2
  random_state: 42
  probability_threshold: 0.5

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
